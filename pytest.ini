[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    gpu: marks tests that require a CUDA GPU (deselect with -m "not gpu")
    slow: marks tests that take > 30s (deselect with -m "not slow")
    integration: marks full pipeline integration tests
